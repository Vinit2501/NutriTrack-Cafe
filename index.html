<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack - The Botanical Cafe</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #fdfcf0; color: #2d4628; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 800px; width: 90%; padding: 40px; text-align: center; }
        h1 { color: #1b3022; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #5a7d52; }
        .search-box { margin: 30px 0; display: flex; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 50px; background: white; padding: 5px 20px; }
        input { flex: 1; border: none; padding: 15px; outline: none; font-size: 1rem; border-radius: 50px; }
        button { background: #5a7d52; color: white; border: none; padding: 10px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #3e5c36; }
        #result { margin-top: 30px; padding: 25px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left; line-height: 1.6; display: none; }
        .loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid #5a7d52; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>NutriTrack.</h1>
        <p>THE BOTANICAL CAFE</p>
        <div class="search-box">
            <input type="text" id="foodInput" placeholder="Search for an apple, a cheeseburger, etc...">
            <button onclick="analyzeFood()">ANALYZE</button>
        </div>
        <div class="loader" id="loader"></div>
        <div id="result"></div>
    </div>

    <script>
        async function analyzeFood() {
            const food = document.getElementById('foodInput').value;
            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            
            if(!food) return;

            resultDiv.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ food_query: food })
                });

                const data = await response.json();
                loader.style.display = 'none';
                resultDiv.style.display = 'block';
                
                if (response.ok) {
                    resultDiv.innerText = data.analysis;
                } else {
                    resultDiv.innerText = "Error: " + data.detail;
                }
            } catch (error) {
                loader.style.display = 'none';
                resultDiv.style.display = 'block';
                resultDiv.innerText = "Connection error. Please try again.";
            }
        }
    </script>
</body>
</html>
